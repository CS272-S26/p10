   <header class="hero text-center">
    <h1>Contact Us</h1>
  </header>

  <main class="container my-5">

  <div class="row">

    <!-- CONTACT FORM -->
    <div class="col-md-7 mb-4">

      <h3 class="mb-3">Send us a message</h3>

      <form id="contactForm">

        <div class="form-group">
          <label>Name</label>
          <input type="text" class="form-control" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" placeholder="Your email" required>
        </div>

        <div class="form-group">
          <label>Subject</label>
          <input type="text" class="form-control" placeholder="What is this about?">
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea class="form-control" rows="5" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="btn btn-dark btn-block">
          Send Message
        </button>

      </form>

    </div>

    <div class="col-md-5">

      <h3 class="mb-3">Reach Us Directly</h3>

      <div class="card p-3 mb-3">
        <h5>Email</h5>
        <p class="mb-0">example@email.com</p>
      </div>

      <div class="card p-3 mb-3">
        <h5>Phone</h5>
        <p class="mb-0">+1 (234) 456-7890</p>
      </div>

      <div class="card p-3 mb-3">
        <h5>Hours</h5>
        <p class="mb-0">Calling Hours:- Mon - Fri: 9AM - 6PM</p>
      </div>

      <div class="card p-3">
        <h5>Response Time</h5>
        <p class="mb-0">
          24 hour guarantee
        </p>
      </div>

    </div>

  </div>

</main>

   <footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">&copy; Nile | CS472 P10 </p>
  </footer>

  <script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();
  alert("Message sent! We’ll get back to you soon.");
  this.reset();
});
</script>

</body>
