<!-- product.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="hero text-center">
    <div class="container">
      <h1 class="display-4">Nyx</h1>
    </div>
  </header>

<div class="container py-5">

  <!-- Product Main Section -->
  <div class="row g-5">
    
    <!-- Images -->
    <div class="col-md-6">
      <img id="mainImage" src="" alt="Product Image" class="product-image shadow-sm mb-3">

      <div id="thumbnailContainer" class="d-flex flex-wrap gap-2"></div>
    </div>

    <!-- Product Info -->
    <div class="col-md-6">
      <h2 id="productTitle"></h2>

      <p class="text-muted mb-1">
        Brand: <span id="brandName"></span>
      </p>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="rating"> Rating: <span id="productRating"></span></div>
        <p><strong>Total Ratings:</strong> <span id="totalRatings"></span></p>
      </div>  

      <div class="price">Price: <span id="individualProductPrice"></span></div>
      <button class="btn btn-dark w-100 mt-3">Add to Cart</button>
      <br>
      <h5>Description</h5>
      <p id="description"></p>
      
    </div>
  </div>

  <!-- Reviews Section -->
  <div class="mt-5">
    <h3>Top Reviews For This Product</h3>
    <div id="reviewsContainer" class="row g-4 mt-2"></div>
  </div>

</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">&copy; Nile | CS472 P10 </p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
